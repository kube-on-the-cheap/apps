---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  values:
    config:
      url: "https://paperless.homelab.blacksd.tech"
    persistence:
      enabled: true
      storageClass: "openebs-rawfile"
      accessMode: ReadWriteOnce
      size: 10Gi
    valkey:
      dataStorage:
        className: "openebs-rawfile"
  postRenderers:
    # PVC is ReadWriteOnce; Recreate strategy prevents two pods holding the
    # same data dir during rollouts (avoids migration_lock contention).
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: paperless-ngx
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: paperless-ngx
              spec:
                strategy:
                  $patch: replace
                  type: Recreate
