---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  values:
    config:
      url: "https://paperless.homelab.blacksd.tech"
    persistence:
      enabled: true
      storageClass: "openebs-rawfile"
      accessMode: ReadWriteOnce
      size: 10Gi
    valkey:
      dataStorage:
        className: "openebs-rawfile"
