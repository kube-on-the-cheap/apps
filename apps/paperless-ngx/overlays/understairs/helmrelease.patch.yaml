---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
spec:
  values:
    config:
      url: "https://paperless.homelab.blacksd.tech"
    persistence:
      enabled: true
      storageClass: "openebs-rawfile"
      accessMode: ReadWriteOnce
      size: 10Gi
    valkey:
      dataStorage:
        className: "openebs-rawfile"
  postRenderers:
    # PVC is ReadWriteOnce; Recreate strategy prevents two pods holding the
    # same data dir during rollouts (avoids migration_lock contention).
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: paperless-ngx
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: paperless-ngx
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
          # Init takes ~100s on this hardware (PG migration check + django checks)
          # and the chart doesn't expose startupProbe. Without it, liveness/readiness
          # fire before granian binds :8000 and the pod gets killed mid-init.
          - target:
              kind: Deployment
              name: paperless-ngx
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/startupProbe
                value:
                  httpGet:
                    path: /
                    port: http
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
