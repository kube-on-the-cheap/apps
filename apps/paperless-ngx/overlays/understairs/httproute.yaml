---
# Admin/UI restricted to specific IP
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
  hostnames:
    - paperless.homelab.blacksd.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: paperless-ngx
          port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: paperless-ngx-ip-filter
  namespace: paperless-ngx
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: paperless-ngx
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            - 192.168.20.0/24
            - 100.64.0.0/10
