---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: paperless-ngx
  targetNamespace: paperless-ngx
  chart:
    spec:
      chart: paperless-ngx
      version: "0.3.19"
      sourceRef:
        kind: HelmRepository
        name: paperless-ngx
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: paperless-ngx-values
      valuesKey: values.yaml
