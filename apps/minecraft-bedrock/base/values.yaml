# Minecraft Bedrock Dedicated Server
image:
  repository: docker.io/itzg/minecraft-bedrock-server
  tag: latest
  pullPolicy: Always

# Server properties
minecraftServer:
  eula: "TRUE"
  version: "LATEST"
  serverName: Terra di SempreInMezzo
  levelName: Polli con e senza controller.
  gameMode: creative
  difficulty: normal
  maxPlayers: 10
  onlineMode: false
  # Bedrock default port
  serverPort: 19132
  serviceType: LoadBalancer
  enableLanVisibility: true
  cheats: true

persistence:
  storageClass: openebs-rawfile
  dataDir:
    enabled: true
    Size: 5Gi

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Cold-start on understairs hardware with a non-trivial world takes
# 1-2 minutes before the Bedrock RakNet socket accepts pings. The
# chart's default liveness window (30s + 3*10s = 60s) kills the pod
# mid-init, causing CrashLoopBackOff. Enable the chart's startupProbe
# (10-minute budget by default) to gate liveness/readiness until the
# server is actually up.
startupProbe:
  enabled: true
