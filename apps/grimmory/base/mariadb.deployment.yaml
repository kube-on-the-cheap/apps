---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory
    app.kubernetes.io/component: mariadb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grimmory
      app.kubernetes.io/component: mariadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grimmory
        app.kubernetes.io/component: mariadb
    spec:
      securityContext:
        fsGroup: 100
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.8
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: PUID
              value: "1027"
            - name: PGID
              value: "100"
            - name: TZ
              value: "Europe/Rome"
            - name: MYSQL_DATABASE
              value: "grimmory"
            - name: MYSQL_USER
              value: "grimmory"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-mariadb-root
                  key: password
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-db
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mariadb-admin
                - ping
                - -h
                - localhost
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: grimmory-mariadb
