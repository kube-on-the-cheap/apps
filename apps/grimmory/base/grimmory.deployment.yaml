---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grimmory
  namespace: grimmory
  labels:
    app.kubernetes.io/name: grimmory
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grimmory
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grimmory
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsUser: 1027
        runAsGroup: 100
        fsGroup: 100
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mariadb 3306; do
                echo "waiting for mariadb:3306..."
                sleep 2
              done
              echo "mariadb is up"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: grimmory
          image: ghcr.io/grimmory-tools/grimmory:v0.38.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6060
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Rome"
            - name: USER_ID
              value: "1027"
            - name: GROUP_ID
              value: "100"
            - name: DISK_TYPE
              value: "LOCAL"
            - name: DATABASE_URL
              value: "jdbc:mariadb://mariadb:3306/grimmory"
            - name: DATABASE_USERNAME
              value: "grimmory"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grimmory-db
                  key: password
            - name: SWAGGER_ENABLED
              value: "false"
            - name: FORCE_DISABLE_OIDC
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: books
              mountPath: /books
            - name: books
              mountPath: /bookdrop
              subPath: bookdrop
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1536Mi
          startupProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/healthcheck
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grimmory-data
        - name: books
          persistentVolumeClaim:
            claimName: grimmory-library
