---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: readeck
  namespace: readeck
  labels:
    app.kubernetes.io/name: readeck
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: readeck
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: readeck
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: readeck
          image: codeberg.org/readeck/readeck:0.22.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Rome"
            - name: READECK_SERVER_HOST
              value: "0.0.0.0"
            - name: READECK_SERVER_PORT
              value: "8000"
            - name: READECK_USE_X_FORWARDED
              value: "true"
            - name: READECK_ALLOWED_HOSTS
              value: "reader.homelab.blacksd.tech"
            - name: READECK_TRUSTED_PROXIES
              value: "0.0.0.0/0"
            - name: READECK_LOG_FORMAT
              value: "text"
          volumeMounts:
            - name: data
              mountPath: /readeck
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: readeck-data
