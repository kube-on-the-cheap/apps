---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: readeck-timeouts
  namespace: readeck
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: readeck
  timeout:
    http:
      requestTimeout: 60s
      connectionIdleTimeout: 5m
