---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: zitadel
  targetNamespace: zitadel
  chart:
    spec:
      chart: zitadel
      version: "9.34.1"
      sourceRef:
        kind: HelmRepository
        name: zitadel
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: zitadel-values
      valuesKey: values.yaml
