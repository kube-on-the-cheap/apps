apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - httproute.yaml
  - secrets.sops.yaml
configMapGenerator:
  - name: homepage-config
    namespace: homepage
    files:
      - config/settings.yaml
      - config/services.yaml
      - config/widgets.yaml
      - config/bookmarks.yaml
      - config/kubernetes.yaml
      - config/docker.yaml
      - config/custom.css
      - config/custom.js
