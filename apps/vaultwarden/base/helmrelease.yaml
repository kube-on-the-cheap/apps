---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  releaseName: vaultwarden
  targetNamespace: vaultwarden
  chart:
    spec:
      chart: vaultwarden
      version: "0.36.4"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: vaultwarden-values
      valuesKey: values.yaml
