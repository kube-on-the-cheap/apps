---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  values:
    domain: "https://vault.homelab.blacksd.tech"
    storage:
      data:
        name: "vaultwarden-data"
        size: "2Gi"
        class: "openebs-rawfile"
        path: "/data"
        keepPvc: true
        accessMode: "ReadWriteOnce"
    smtp:
      host: smtp.email.eu-frankfurt-1.oci.oraclecloud.com
      port: 587
      from: do-not-reply@mail.cloud.blacksd.tech
      fromName: Marco's Homelab - Vaultwarden
      security: starttls
      authMechanism: Plain
      existingSecret: vaultwarden-smtp
      username:
        existingSecretKey: username
      password:
        existingSecretKey: password
