---
# Admin interface - restricted to specific IP
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden-admin
  namespace: vaultwarden
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
  hostnames:
    - vault.homelab.blacksd.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: vaultwarden
          port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: vaultwarden-admin-ip-filter
  namespace: vaultwarden
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: vaultwarden-admin
  authorization:
    defaultAction: Deny
    rules:
      - action: Allow
        principal:
          clientCIDRs:
            - 192.168.20.0/24
            - 100.64.0.0/10
---
# Public routes - vault, login, API
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vaultwarden-public
  namespace: vaultwarden
spec:
  parentRefs:
    - name: external
      namespace: envoy-gateway-system
  hostnames:
    - vault.homelab.blacksd.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vaultwarden
          port: 80
