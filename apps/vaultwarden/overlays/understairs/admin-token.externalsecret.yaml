---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: vaultwarden-admin-token-generator
  namespace: vaultwarden
spec:
  length: 48
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vaultwarden-admin-token
  namespace: vaultwarden
spec:
  refreshInterval: "0"
  target:
    name: vaultwarden-admin-token
    creationPolicy: Owner
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: vaultwarden-admin-token-generator
      rewrite:
        - regexp:
            source: "password"
            target: "token"
