---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bitwarden
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  releaseName: bitwarden
  targetNamespace: bitwarden
  chart:
    spec:
      chart: self-host
      version: "1.1.12"
      sourceRef:
        kind: HelmRepository
        name: bitwarden
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: bitwarden-values
      valuesKey: values.yaml
