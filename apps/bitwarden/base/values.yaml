fullnameOverride: "bitwarden"

general:
  domain: "REPLACE"
  databaseProvider: "postgres"
  ingress:
    enabled: false
  gateway:
    enabled: false
  disableUserRegistration: "true"
  admins: ""
  email:
    replyToEmail: "no-reply@bitwarden.localhost"
    smtpHost: ""
    smtpPort: "587"
    smtpSsl: "false"
    smtpTrustServer: "false"
    smtpSslOverride: "false"
    smtpStartTls: "true"
  volumeAccessMode: "ReadWriteOnce"
  enableCloudCommunication: false

sharedStorageClassName: "openebs-rawfile"

secrets:
  secretName: bitwarden-custom-secret
  secretKeys:
    generate: true
  identityCertificate:
    generate: true

database:
  enabled: false

component:
  admin:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "192Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"
        cpu: "250m"
  api:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "192Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"
        cpu: "250m"
  attachments:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "96Mi"
        cpu: "25m"
      limits:
        memory: "192Mi"
        cpu: "100m"
  events:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "96Mi"
        cpu: "25m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  icons:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "96Mi"
        cpu: "25m"
      limits:
        memory: "192Mi"
        cpu: "100m"
  identity:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "192Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"
        cpu: "250m"
  notifications:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "96Mi"
        cpu: "25m"
      limits:
        memory: "192Mi"
        cpu: "100m"
  scim:
    enabled: false
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
  sso:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "96Mi"
        cpu: "25m"
      limits:
        memory: "256Mi"
        cpu: "100m"
  web:
    extraEnv:
      - name: globalSettings__postgreSql__connectionString
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: uri
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "192Mi"
        cpu: "100m"

volume:
  dataprotection:
    size: "1Gi"
  attachments:
    size: "2Gi"
  licenses:
    size: "1Gi"
  logs:
    enabled: false
  caCertificates:
    enabled: false
