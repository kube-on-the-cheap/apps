fullnameOverride: "bitwarden"

general:
  domain: "REPLACE"
  databaseProvider: "postgres"
  ingress:
    enabled: false
  gateway:
    enabled: false
  disableUserRegistration: "false"
  admins: ""
  email:
    replyToEmail: "no-reply@bitwarden.localhost"
    smtpHost: ""
    smtpPort: "587"
    smtpSsl: "false"
    smtpTrustServer: "false"
    smtpSslOverride: "false"
    smtpStartTls: "true"
  volumeAccessMode: "ReadWriteOnce"
  enableCloudCommunication: false

sharedStorageClassName: "openebs-rawfile"

secrets:
  secretName: bitwarden-custom-secret
  secretKeys:
    generate: true
  identityCertificate:
    generate: true

database:
  enabled: false

# Probes are widened across the board because pi1 is a slow ARM node and .NET
# cold-starts blow past the chart's 30s defaults, killing pods mid-startup.
#
# Postgres connection: CNPG's bitwarden-pg-app secret holds a libpq-style "uri"
# (postgresql://user:pass@host:port/db). Npgsql's EF Core path constructs
# NpgsqlConnectionStringBuilder directly, which rejects URI format. We inject
# host/port/user/password/dbname separately and compose the key=value form
# (Host=...;Port=...;...) that NpgsqlConnectionStringBuilder accepts. The
# referencing env var uses $(VAR) substitution; Kubernetes resolves in order,
# so the composed var must be listed last.
component:
  admin:
    extraEnv:
      - name: BW_DB_HOST
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: host
      - name: BW_DB_PORT
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: port
      - name: BW_DB_USER
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: username
      - name: BW_DB_PASS
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: password
      - name: BW_DB_NAME
        valueFrom:
          secretKeyRef:
            name: bitwarden-pg-app
            key: dbname
      - name: globalSettings__postgreSql__connectionString
        value: "Host=$(BW_DB_HOST);Port=$(BW_DB_PORT);Username=$(BW_DB_USER);Password=$(BW_DB_PASS);Database=$(BW_DB_NAME)"
    livenessProbe:
      httpGet:
        path: /alive
        port: 5000
      initialDelaySeconds: 300
      periodSeconds: 30
      failureThreshold: 5
      timeoutSeconds: 10
    readinessProbe:
      httpGet:
        path: /alive
        port: 5000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 5
      timeoutSeconds: 10
    resources:
      requests:
        memory: "192Mi"
        cpu: "50m"
      limits:
        memory: "384Mi"
        cpu: "250m"
  api:
    extraEnv:
      - name: BW_DB_HOST
