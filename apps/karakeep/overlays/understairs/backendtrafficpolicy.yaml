---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: karakeep-timeouts
  namespace: karakeep
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: karakeep
  timeout:
    http:
      requestTimeout: 60s
      connectionIdleTimeout: 5m
