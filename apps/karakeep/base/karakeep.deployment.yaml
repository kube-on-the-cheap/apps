---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep
  namespace: karakeep
  labels:
    app.kubernetes.io/name: karakeep
    app.kubernetes.io/component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: karakeep
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karakeep
        app.kubernetes.io/component: web
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z karakeep-pg-rw 5432; do echo "waiting for karakeep-pg-rw:5432..."; sleep 2; done
              until nc -z meilisearch 7700; do echo "waiting for meilisearch:7700..."; sleep 2; done
              until nc -z chrome 9222; do echo "waiting for chrome:9222..."; sleep 2; done
              echo "all deps up"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: karakeep
          image: ghcr.io/karakeep-app/karakeep:0.32.0@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Rome"
            - name: NEXTAUTH_URL
              value: "https://bookmarks.homelab.blacksd.tech"
            - name: DATA_DIR
              value: "/data"
            - name: MEILI_ADDR
              value: "http://meilisearch:7700"
            - name: BROWSER_WEB_URL
              value: "http://chrome:9222"
            - name: DISABLE_SIGNUPS
              value: "false"
            - name: CRAWLER_SCREENSHOT_TIMEOUT_SEC
              value: "30"
            - name: CRAWLER_NAVIGATE_TIMEOUT_SEC
              value: "60"
            - name: CRAWLER_JOB_TIMEOUT_SEC
              value: "120"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: karakeep-nextauth-secret
                  key: password
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-meili-master-key
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: karakeep-pg-app
                  key: uri
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: karakeep-data
