# global.env is fully provided by each overlay's helmrelease.patch.yaml
# (per-cluster Postgres + email secret wiring varies; AUTHENTIK_SECRET_KEY too).
# Kustomize replaces YAML lists rather than merging, so any env var defined
# here would be silently dropped by the overlay. Keep this block empty.
global: {}

server:
  ingress:
    enabled: false
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 2Gi
  autoscaling:
    enabled: false
  metrics:
    enabled: true
    # serviceMonitor:
    #   enabled: true
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 512Mi
  volumeMounts:
    - name: shm
      mountPath: /dev/shm

worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 1Gi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 2Gi

postgresql:
  enabled: false

# SMTP transport settings — username/password come in via global.env from
# each overlay's helmrelease.patch.yaml (ExternalSecret-backed). The chart
# expects these under authentik.email, not at the top level.
authentik:
  email:
    host: smtp.email.eu-frankfurt-1.oci.oraclecloud.com
    port: 587
    use_tls: true
    from: do-not-reply@mail.cloud.blacksd.tech
