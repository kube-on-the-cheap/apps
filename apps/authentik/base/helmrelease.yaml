---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 30m
  timeout: 5m
  releaseName: authentik
  targetNamespace: authentik
  chart:
    spec:
      chart: authentik
      version: "2026.5.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
  # install:
  #   createNamespace: true
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  valuesFrom:
    - kind: ConfigMap
      name: authentik-values
      valuesKey: values.yaml
