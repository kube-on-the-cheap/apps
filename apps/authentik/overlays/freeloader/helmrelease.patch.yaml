---
# Kustomize merge note: this patch REPLACES the global.env list from base values.yaml.
# If you add a new env var, mirror it here too — kustomize does not merge YAML lists.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  values:
    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-secret-key
              key: secret-key
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: host
        - name: AUTHENTIK_POSTGRESQL__PORT
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: port
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: name
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: user
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: password
        - name: AUTHENTIK_POSTGRESQL__SSLMODE
          valueFrom:
            secretKeyRef:
              name: authentik-postgres
              key: sslmode
        # Neon serverless tuning: the Postgres is fronted by Neon's pgbouncer
        # in transaction mode, and the compute scales to zero when idle.
        # Persistent connections (CONN_MAX_AGE > 0) and the cursor disable are
        # both required by Neon's pooler; without them every Authentik request
        # does a fresh TCP handshake against the pooler and burns DB compute
        # minutes. The CONN_MAX_AGE spinning bug from PR #22679 was fixed in
        # 2026.5.2 (cherry-pick 518683f), so persistent conns are safe here.
        - name: AUTHENTIK_POSTGRESQL__CONN_MAX_AGE
          value: "300"
        - name: AUTHENTIK_POSTGRESQL__CONN_HEALTH_CHECKS
          value: "true"
        - name: AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS
          value: "true"
        - name: AUTHENTIK_EMAIL__USERNAME
          valueFrom:
            secretKeyRef:
              name: email-credentials
              key: username
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: email-credentials
              key: password
