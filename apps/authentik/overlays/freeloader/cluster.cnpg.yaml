---
# Hardened against the past "WAL filled the disk" incident:
#   - instances: 1 (no replica = no replication slot = no slot-driven WAL retention)
#   - max_replication_slots: 0 (defense-in-depth even if a slot appears via some path)
#   - max_slot_wal_keep_size: 256MB (belt — caps any rogue slot)
#   - wal_keep_size: 0 (no standby-targeted WAL retention)
#   - max_wal_size: 512MB (forces checkpoints earlier under heavy write)
#   - no Barman plugin (no S3-backlog WAL retention vector)
# Worst-case pg_wal footprint stays under ~800 MB; PVC is 5 GiB.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16.2

  storage:
    storageClass: openebs-lvm
    size: 5Gi

  resources:
    requests:
      memory: 192Mi
      cpu: 100m
    limits:
      memory: 384Mi
      cpu: 500m

  bootstrap:
    initdb:
      database: authentik
      owner: authentik

  postgresql:
    parameters:
      max_worker_processes: "4"
      max_parallel_workers: "2"
      max_replication_slots: "0"
      max_slot_wal_keep_size: "256MB"
      wal_keep_size: "0"
      max_wal_size: "512MB"
      min_wal_size: "80MB"

  priorityClassName: system-cluster-critical
