---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: minecraft-bedrock
  namespace: flux-system
spec:
  interval: 15m0s
  sourceRef:
    kind: GitRepository
    name: apps
  path: ./apps/minecraft-bedrock/overlays/understairs
  prune: true
  wait: true
  timeout: 10m0s
  # The age key location is set in the Flux kustomize-controller flags (global decryption)
  decryption:
    provider: sops
