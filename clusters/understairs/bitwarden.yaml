---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: bitwarden
  namespace: flux-system
spec:
  interval: 15m0s
  sourceRef:
    kind: GitRepository
    name: apps
  path: ./apps/bitwarden/overlays/understairs
  prune: true
  wait: true
  timeout: 15m0s
  decryption:
    provider: sops
